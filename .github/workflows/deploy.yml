name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            cd /var/www/asterlogic-hrms/hrms

            # Backup the live DB from whichever path it currently lives at.
            # Old code used backend/hrms.db; new code uses backend/data/hrms.db.
            # We always restore to backend/data/hrms.db (canonical location).
            if [ -f backend/data/hrms.db ]; then
              cp backend/data/hrms.db /tmp/hrms.db.bak
            elif [ -f backend/hrms.db ]; then
              cp backend/hrms.db /tmp/hrms.db.bak
            fi

            # Reset any tracked DB files so git pull doesn't abort
            git checkout -- backend/hrms.db 2>/dev/null || true

            git pull origin main

            # Restore production DB to the canonical location
            mkdir -p backend/data
            if [ -f /tmp/hrms.db.bak ]; then
              mv /tmp/hrms.db.bak backend/data/hrms.db
            fi
            # Ensure the app process (PM2) can write DB + create journal files
            chmod 777 backend/data 2>/dev/null || true
            chmod 666 backend/data/hrms.db 2>/dev/null || true
            # Remove the old duplicate DB at the legacy path
            rm -f backend/hrms.db

            bash deploy.sh
