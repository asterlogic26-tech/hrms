name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            cd /var/www/asterlogic-hrms/hrms

            # Preserve the live production DB before git operations.
            # The DB is a SQLite file modified at runtime; git pull aborts if it
            # has local changes.  Back it up, reset the tracked copy, pull, then
            # restore the live data.
            if [ -f backend/hrms.db ]; then
              cp backend/hrms.db /tmp/hrms.db.bak
            fi
            git checkout -- backend/hrms.db 2>/dev/null || true
            git pull origin main
            if [ -f /tmp/hrms.db.bak ]; then
              mv /tmp/hrms.db.bak backend/hrms.db
            fi

            bash deploy.sh
